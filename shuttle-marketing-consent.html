<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Opening Shuttle App...</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
      }
      .card {
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
        padding: 40px 32px;
        max-width: 360px;
        width: 100%;
        text-align: center;
      }
      .logo {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        background: #ff5a00;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
        font-size: 36px;
      }
      h1 {
        font-size: 20px;
        font-weight: 700;
        color: #111;
        margin-bottom: 8px;
      }
      p {
        font-size: 14px;
        color: #666;
        line-height: 1.6;
        margin-bottom: 28px;
      }
      .btn {
        display: block;
        width: 100%;
        padding: 14px;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 600;
        text-decoration: none;
        cursor: pointer;
        border: none;
        margin-bottom: 12px;
        transition: opacity 0.2s;
      }
      .btn:active {
        opacity: 0.8;
      }
      .btn-primary {
        background: #ff5a00;
        color: #fff;
      }
      .btn-secondary {
        background: #f0f0f0;
        color: #333;
      }
      .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid #f0f0f0;
        border-top-color: #ff5a00;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 20px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      #status {
        font-size: 13px;
        color: #999;
        margin-top: 16px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">🚀</div>
      <h1>Opening Shuttle</h1>
      <p>
        We're trying to open the Shuttle app for you. If it doesn't open
        automatically, tap the button below.
      </p>

      <div class="spinner" id="spinner"></div>

      <button class="btn btn-primary" id="openAppBtn" onclick="openApp()">
        Open in Shuttle App
      </button>
      <a
        class="btn btn-secondary"
        id="fallbackBtn"
        href="https://www.shuttledelivery.co.kr/"
        target="_blank"
        >Open Website Instead</a
      >

      <div id="status">Attempting to open app…</div>
    </div>

    <script>
      const APP_SCHEME = "goshuttle://me"
      const FALLBACK_URL = "https://www.shuttledelivery.co.kr/"
      // Delay (ms) before assuming the app is not installed and redirecting
      const FALLBACK_DELAY = 2500

      function openApp() {
        const start = Date.now()
        window.location.href = APP_SCHEME

        const timer = setTimeout(() => {
          // If we're still here after the delay, the app likely isn't installed
          const elapsed = Date.now() - start
          if (elapsed < FALLBACK_DELAY + 500) {
            document.getElementById("status").textContent =
              "App not found. Redirecting to website…"
            document.getElementById("spinner").style.display = "none"
            window.location.href = FALLBACK_URL
          }
        }, FALLBACK_DELAY)

        // If the page regains focus quickly it probably means the app opened OK
        const onVisibilityChange = () => {
          if (!document.hidden) {
            clearTimeout(timer)
            document.getElementById("spinner").style.display = "none"
            document.getElementById("status").textContent =
              "App opened successfully."
            document.removeEventListener("visibilitychange", onVisibilityChange)
          }
        }
        document.addEventListener("visibilitychange", onVisibilityChange)
      }

      // Auto-trigger on page load
      window.addEventListener("load", () => {
        setTimeout(openApp, 400)
      })
    </script>
  </body>
</html>
